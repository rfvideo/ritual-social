[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
ritual = "${RITUAL_RPC_URL}"

[etherscan]
# Only relevant if Ritual Explorer exposes an Etherscan-compatible verify API.
# Leave blank / remove if it does not — verification is optional.
ritual = { key = "${RITUAL_EXPLORER_API_KEY}", url = "${RITUAL_EXPLORER_VERIFY_URL}" }
